name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Status check names match job ids — used by branch protection rules
jobs:
  api-test:
    name: api-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (excludes Stockfish golden)
        run: pytest tests -v -m "not stockfish"

  web-lint:
    name: web-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:web

  web-build:
    name: web-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:web
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key

  migration-check:
    name: migration-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify migrations exist and mention core tables
        shell: bash
        run: |
          test -d supabase/migrations
          sql=$(cat supabase/migrations/*.sql)
          echo "$sql" | grep -q "games"
          echo "$sql" | grep -q "brilliant"
          echo "$sql" | grep -q "style_vectors"

      - name: Verify philosophy docs exist
        shell: bash
        run: |
          test -f docs/PHILOSOPHY.md
          test -f docs/QUALITY_GATES.md
          test -f docs/adr/0001-style-over-accuracy.md
